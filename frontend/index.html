<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <!-- viewport-fit=cover lets the page paint into the iOS notch and safe-area gutters.
         The app already pads its content for env(safe-area-inset-*), so we get an
         edge-to-edge native feel when installed as a PWA. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / installable web app ─────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="application-name" content="AutoSplit" />
    <!-- iOS Safari treats these meta tags as PWA hints — Apple ignores most
         of the manifest, so we duplicate the important bits here. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoSplit" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png" />

    <title>AutoSplit — Split Group Trip Expenses Automatically</title>
    <meta name="description" content="Upload your credit card statement, AutoSplit figures out who owes what. The fastest way to settle group trip expenses." />

    <!-- Open Graph — controls the preview card when sharing the link on Slack, iMessage, Twitter, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://autosplit.co/" />
    <meta property="og:title" content="AutoSplit — Split Group Trip Expenses Automatically" />
    <meta property="og:description" content="Upload your credit card statement, AutoSplit figures out who owes what. The fastest way to settle group trip expenses." />
    <meta property="og:image" content="https://autosplit.co/og-image.png" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AutoSplit — Split Group Trip Expenses Automatically" />
    <meta name="twitter:description" content="Upload your credit card statement, AutoSplit figures out who owes what." />
    <meta name="twitter:image" content="https://autosplit.co/og-image.png" />

    <!-- Cormorant Garamond (display) + Geist (body + mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
